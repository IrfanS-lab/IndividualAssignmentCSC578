<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gamer Experience Survey</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 id="title">Level Up Your Feedback</h1>
        <p id="description">Help us improve the gaming experience by sharing your thoughts!</p>
    </header>

    <form id="survey-form">
        <div class="form-group">
            <label id="name-label" for="name">Name</label>
            <input type="text" id="name" placeholder="Enter your player name" required>
        </div>

        <div class="form-group">
            <label id="email-label" for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label id="number-label" for="number">Hours played per week</label>
            <input type="number" id="number" min="0" max="168" placeholder="0-168">
        </div>

        <div class="form-group">
            <p>Preferred Platform</p>
            <select id="dropdown">
                <option disabled selected value>Select platform</option>
                <option value="pc">PC</option>
                <option value="console">Console</option>
                <option value="mobile">Mobile</option>
            </select>
        </div>

        <div class="form-group">
            <p>Would you recommend this game?</p>
            <label>
                <input name="recommend" value="definitely" type="radio" class="input-radio" checked> Definitely
            </label>
            <label>
                <input name="recommend" value="maybe" type="radio" class="input-radio"> Maybe
            </label>
            <label>
                <input name="recommend" value="not-really" type="radio" class="input-radio"> Not Really
            </label>
        </div>

        <div class="form-group">
            <p>What features do you enjoy? (Select all that apply)</p>
            <label><input type="checkbox" value="graphics" name="features"> Graphics</label>
            <label><input type="checkbox" value="story" name="features"> Storyline</label>
            <label><input type="checkbox" value="multiplayer" name="features"> Multiplayer</label>
        </div>

        <div class="form-group">
            <p>Any additional comments?</p>
            <textarea id="comments" placeholder="Write your feedback here..."></textarea>
        </div>

        <button type="submit" id="submit">Submit Feedback</button>
    </form>
</body>
</html>
